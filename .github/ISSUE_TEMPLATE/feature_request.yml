name: Feature request
description: Propose a new capability, option, or public API change.
title: "[Feature]: "
labels:
    - enhancement
body:
    - type: textarea
      id: use-case
      attributes:
          label: Use case
          description: What user problem would this solve?
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposed solution
          description: Describe the API or behavior you would like to see.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Describe any workarounds or alternative APIs you have considered.
