name: Bug report
description: Report a reproducible problem with vite-plugin-keep-console.
title: "[Bug]: "
labels:
    - bug
body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: Describe the problem and the expected behavior.
      validations:
          required: true
    - type: textarea
      id: reproduction
      attributes:
          label: Minimal reproduction
          description: Link to a reproduction or paste the smallest Vite config and source code that show the issue.
          render: ts
      validations:
          required: true
    - type: input
      id: plugin-version
      attributes:
          label: Plugin version
          placeholder: "vite-plugin-keep-console@1.0.0"
      validations:
          required: true
    - type: input
      id: vite-version
      attributes:
          label: Vite version
          placeholder: "vite@6.3.5"
      validations:
          required: true
    - type: input
      id: node-version
      attributes:
          label: Node.js version
          placeholder: "node@22.12.0"
      validations:
          required: true
    - type: dropdown
      id: backend
      attributes:
          label: Backend
          description: Which backend is configured?
          options:
              - auto
              - oxc
              - babel
      validations:
          required: true
    - type: textarea
      id: config
      attributes:
          label: Plugin configuration
          description: Paste the `ConsoleKeeper(...)` options you are using.
          render: ts
    - type: textarea
      id: notes
      attributes:
          label: Additional context
          description: Add logs, stack traces, screenshots, or other details that may help diagnose the issue.
